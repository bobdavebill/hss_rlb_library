<!DOCTYPE html>
<html>
<head>
  <title>HSS Rani Lakshmibai Shakha Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  color: #ea5207;
  font-family: "Arial", sans-serif;
  margin: 0;
  padding: 15px;
  text-align: center;
  background: #fff;
}

img {
  max-width: 100%;
  height: auto;
}

h2 {
  font-size: 1.5rem;
  margin: 15px 0;
}

label {
  display: block;
  text-align: left;
  margin: 8px 0 4px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  background: #fff0e6;
  color: #ea5207;
  cursor: pointer;
}

button:hover {
  background: #ffe5d6;
}

#result {
  width: 100%;
  height: 150px;
  margin-top: 15px;
  resize: none;
  border: none;
  outline: none;
  background: #f9f9f9;
  font-family: inherit;
  font-size: 14px;
  border-radius: 8px;
  padding: 10px;
  box-sizing: border-box;
}

#confirmBtn {
  display: none;
}

pre#output {
  margin-top: 15px;
  white-space: pre-wrap;
  text-align: left;
  font-size: 14px;
}
</style>

</head>
<body>
  <img src="logo.png" alt="Library Logo">
  <h2>HSS Rani Lakshmibai Shakha Library</h2>


  <h3>Account</h3>

  <input type="text" id="nameInput" placeholder="Full Name">


<input type="email" id="emailInput" placeholder="Email">

<input type="password" id="passwordInput" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

<button onclick="googleLogin()">Sign In With Google</button>

<button onclick="logout()">Logout</button>

<p id="userStatus">Not logged in</p>

<hr>

  <label for="bookInput">Book:</label>
  <input type="text" id="bookInput">

  <button onclick="borrowBook()">Borrow</button>
  <button onclick="returnBook()">Return</button>

  <textarea id="result" readonly></textarea>
  <button id="confirmBtn" onclick="confirmAction()">Confirm</button>

  <pre id="output"></pre>

<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore-compat.js"></script>
<script> 

const firebaseConfig = {
  apiKey: "AIzaSyC9qoQ6ktZBObLYiGC-AQbTBxq6_9t7Gw8",
  authDomain: "hss-rlb-library.firebaseapp.com",
  projectId: "hss-rlb-library",
  storageBucket: "hss-rlb-library.firebasestorage.app",
  messagingSenderId: "222885365383",
  appId: "1:222885365383:web:01e8e5a19b27c871be5a22"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function signup() {

  const name =
    document.getElementById("nameInput").value.trim();

  const email =
    document.getElementById("emailInput").value.trim();

  const password =
    document.getElementById("passwordInput").value;

  auth.createUserWithEmailAndPassword(
    email,
    password
  )
  .then((userCredential) => {

    return userCredential.user.updateProfile({
      displayName: name
    });

  })
  .then(() => {

    alert("Account created successfully");

  })
  .catch(err => {

    alert(err.message);

  });

}

function login() {

  const email =
    document.getElementById("emailInput").value;

  const password =
    document.getElementById("passwordInput").value;

  auth.signInWithEmailAndPassword(
    email,
    password
  )
  .catch(err => alert(err.message));

}

function googleLogin() {

  const provider =
    new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
      .catch(err => alert(err.message));

}

function logout() {

  auth.signOut();

}

auth.onAuthStateChanged(user => {

  const status =
    document.getElementById("userStatus");

  if (user) {

    status.textContent =
      "Logged in as " +
      (user.displayName || user.email);

  } else {

    status.textContent =
      "Not logged in";

  }

});

  let pendingAction = null;
  let currentBook = null;

 async function findBook() {

    const bookId =
        document.getElementById("bookInput").value.trim();

    const resultBox =
        document.getElementById("result");

    if (!bookId) {

        resultBox.value =
            "Please enter a Book Number.";

        return false;

    }

    const doc =
        await db.collection("books")
        .doc(bookId)
        .get();

    if (!doc.exists) {

        resultBox.value =
            "Book Number not found.";

        document.getElementById("confirmBtn").style.display =
            "none";

        return false;

    }

    currentBook = doc;

    const book = doc.data();

    resultBox.value =
        `Book Name: ${book.bookName}

Publisher: ${book.publisher}

Author: ${book.author}

Status: ${book.status}

Press Confirm if this is correct.`;

    document.getElementById("confirmBtn").style.display =
        "block";

    return true;

}

async function borrowBookOnSheet() {

    const user = auth.currentUser;

    if (!user) {

        alert("Please log in first");

        return;

    }

    const book =
        currentBook.data();

    if (book.status !== "In box") {

        document.getElementById("output").textContent =
            "Book already borrowed by " +
            book.status;

        return;

    }

    await currentBook.ref.update({

        status: user.displayName

    });

    document.getElementById("output").textContent =
        "Book borrowed successfully.";

}

async function returnBookOnSheet() {

    const book =
        currentBook.data();

    if (book.status === "In box") {

        document.getElementById("output").textContent =
            "Book is already in the box.";

        return;

    }

    await currentBook.ref.update({

        status: "In box"

    });

    document.getElementById("output").textContent =
        "Book returned successfully.";

}

  async function borrowBook() {
    if (findBook()) {
      pendingAction = "borrow";
    }
  }

  async function returnBook() {
    if (findBook()) {
      pendingAction = "return";
    }
  }

  async function confirmAction() {

    if (pendingAction === "borrow") {

        await borrowBookOnSheet();

    }

    else if (pendingAction === "return") {

        await returnBookOnSheet();

    }

    pendingAction = null;

    currentBook = null;

    document.getElementById("confirmBtn").style.display =
        "none";

}
</script>
</body>
</html>
