<!DOCTYPE html>
<html>
<head>
  <title>HSS Rani Lakshmibai Shakha Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  color: #ea5207;
  font-family: "Arial", sans-serif;
  margin: 0;
  padding: 15px;
  text-align: center;
  background: #fff;
}

img {
  max-width: 100%;
  height: auto;
}

h2 {
  font-size: 1.5rem;
  margin: 15px 0;
}

label {
  display: block;
  text-align: left;
  margin: 8px 0 4px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  background: #fff0e6;
  color: #ea5207;
  cursor: pointer;
}

button:hover {
  background: #ffe5d6;
}

#result {
  width: 100%;
  height: 150px;
  margin-top: 15px;
  resize: none;
  border: none;
  outline: none;
  background: #f9f9f9;
  font-family: inherit;
  font-size: 14px;
  border-radius: 8px;
  padding: 10px;
  box-sizing: border-box;
}

#confirmBtn {
  display: none;
}

pre#output {
  margin-top: 15px;
  white-space: pre-wrap;
  text-align: left;
  font-size: 14px;
}
</style>

</head>
<body>
  <img src="logo.png" alt="Library Logo">
  <h2>HSS Rani Lakshmibai Shakha Library</h2>


  <div id="loginScreen">

<h3>Account</h3>

<input type="text" id="nameInput" placeholder="Full Name">

<input type="email" id="emailInput" placeholder="Email">

<input type="password" id="passwordInput" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

<button onclick="googleLogin()">Sign In With Google</button>

</div>

<div id="libraryScreen" style="display:none;">

<p id="userStatus"></p>

<button onclick="logout()">Logout</button>

<hr>

<label for="bookInput">Book:</label>
<input type="text" id="bookInput">

<button onclick="borrowBook()">Borrow</button>
<button onclick="returnBook()">Return</button>

<textarea id="result" readonly></textarea>

<button id="confirmBtn" onclick="confirmAction()">
Confirm
</button>

<pre id="output"></pre>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init({
    publicKey: "XKilVYlYGnCCNrFzI"
});
</script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore-compat.js"></script>
<script> 

const firebaseConfig = {
  apiKey: "AIzaSyC9qoQ6ktZBObLYiGC-AQbTBxq6_9t7Gw8",
  authDomain: "hss-rlb-library.firebaseapp.com",
  projectId: "hss-rlb-library",
  storageBucket: "hss-rlb-library.firebasestorage.app",
  messagingSenderId: "222885365383",
  appId: "1:222885365383:web:01e8e5a19b27c871be5a22"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
let currentRole = "";

function signup() {

    const name = document.getElementById("nameInput").value.trim();
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;

    let newUser;

    auth.createUserWithEmailAndPassword(email, password)

    .then((userCredential) => {

        newUser = userCredential.user;

        return newUser.updateProfile({
            displayName: name
        });

    })

    .then(() => {

        return db.collection("users")
        .doc(newUser.uid)
        .set({

            name: name,
            email: newUser.email,
            role: "member",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()

        });

    })

    .then(() => {

        return emailjs.send(
            "service_pko02bg",
            "template_kv5qqke",
            {
    name: name,
    email: newUser.email
}
        );

    })

    .then(() => {

        alert("Account created successfully");

    })

    .catch(err => {

        console.error(err);
        alert(err.message);

    });

}

function login() {

  const email =
    document.getElementById("emailInput").value;

  const password =
    document.getElementById("passwordInput").value;

  auth.signInWithEmailAndPassword(
    email,
    password
  )
  .catch(err => alert(err.message));

}

function googleLogin() {

    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(async (result) => {

        const user = result.user;

        const userRef = db.collection("users").doc(user.uid);

        const doc = await userRef.get();

        if (!doc.exists) {

            await userRef.set({

                name: user.displayName || "",

                email: user.email,

                role: "member",

                createdAt: firebase.firestore.FieldValue.serverTimestamp()

            });

        }

    })
    .catch(err => alert(err.message));

}

function logout() {

    auth.signOut();

    document.getElementById("emailInput").value = "";
    document.getElementById("passwordInput").value = "";
    document.getElementById("bookInput").value = "";
    document.getElementById("result").value = "";
    document.getElementById("output").textContent = "";

}

auth.onAuthStateChanged(async user => {

    const loginScreen =
        document.getElementById("loginScreen");

    const libraryScreen =
        document.getElementById("libraryScreen");

    const status =
        document.getElementById("userStatus");

    if (user) {

        const doc = await db
            .collection("users")
            .doc(user.uid)
            .get();

        currentRole =
            doc.exists
            ? doc.data().role
            : "member";

        status.textContent =
            "Welcome, " +
            (user.displayName || user.email) +
            " (" + currentRole + ")";

        loginScreen.style.display = "none";
        libraryScreen.style.display = "block";

    }

    else {

        loginScreen.style.display = "block";
        libraryScreen.style.display = "none";

    }

});

  let pendingAction = null;
  let currentBook = null;

 async function findBook() {

    const bookId =
        document.getElementById("bookInput").value.trim();

    const resultBox =
        document.getElementById("result");

    if (!bookId) {

        resultBox.value =
            "Please enter a Book Number.";

        return false;

    }

    const doc =
        await db.collection("books")
        .doc(bookId)
        .get();

    if (!doc.exists) {

        resultBox.value =
            "Book Number not found.";

        document.getElementById("confirmBtn").style.display =
            "none";

        return false;

    }

    currentBook = doc;

    const book = doc.data();

    let statusText;

if (book.status === "In box") {

    statusText = "Available";

}

else if (
    auth.currentUser &&
    book.status === auth.currentUser.uid
) {

    statusText = "Borrowed by you";

    // Or, if you prefer:
    // statusText = auth.currentUser.displayName;

}

else {

    statusText = "Please see a librarian";

}

resultBox.value =
`Book Name: ${book.bookName}

Publisher: ${book.publisher}

Author: ${book.author}

Status: ${statusText}

Press Confirm if this is correct.`;

    document.getElementById("confirmBtn").style.display =
        "block";

    return true;

}

async function borrowBookOnSheet() {

    const user = auth.currentUser;

    if (!user) {

        alert("Please log in first.");
        return;

    }

    const freshBook = await currentBook.ref.get();
    const book = freshBook.data();

    const borrower = user.uid;

    // Members can only borrow available books
    if (currentRole !== "librarian" && book.status !== "In box") {

        document.getElementById("output").textContent =
            "Please see a librarian";

        return;

    }

    await currentBook.ref.update({

        status: borrower

    });

    document.getElementById("output").textContent =
        "Book borrowed successfully.";

}

async function returnBookOnSheet() {

    const user = auth.currentUser;

    if (!user) {

        alert("Please log in first.");
        return;

    }

    const freshBook = await currentBook.ref.get();
    const book = freshBook.data();

    const borrower = user.uid;

    // Already available
    if (book.status === "In box") {

        document.getElementById("output").textContent =
            "This book is already available.";

        return;

    }

    // Members may only return their own books
    if (
        currentRole !== "librarian" &&
        book.status !== borrower
    ) {

        document.getElementById("output").textContent =
            "You can only return books you have borrowed.";

        return;

    }

    await currentBook.ref.update({

        status: "In box"

    });

    document.getElementById("output").textContent =
        "Book returned successfully.";

}

  async function borrowBook() {
    if (findBook()) {
      pendingAction = "borrow";
    }
  }

  async function returnBook() {
    if (findBook()) {
      pendingAction = "return";
    }
  }

  async function confirmAction() {

    if (pendingAction === "borrow") {

        await borrowBookOnSheet();

    }

    else if (pendingAction === "return") {

        await returnBookOnSheet();

    }

    pendingAction = null;

    currentBook = null;

    document.getElementById("confirmBtn").style.display =
        "none";

}
</script>
</body>
</html>
